name: Bug Report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting! Please fill in the details below.
  - type: input
    id: version
    attributes:
      label: Homunculus version
      description: "Run `cat homunculus/.manifest.json | head -1` or check package.json"
      placeholder: "e.g. 0.9.0"
    validations:
      required: true
  - type: input
    id: claude-code-version
    attributes:
      label: Claude Code version
      placeholder: "e.g. v2.1.85"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Linux
        - Windows (WSL)
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly. Include error messages if any.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Run `npx homunculus-code init`
        2. Run `/hm-night`
        3. See error...
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any relevant log output
      render: shell
